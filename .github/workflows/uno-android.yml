name: Uno Android

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'

      - name: Setup Uno
        run: |
          dotnet workload install android

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Android emulator and run tests
        uses: reactivecircus/android-emulator-runner@v2.35.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          # reactivecircus/android-emulator-runner invokes each line of `script`
          # as its own `sh -c` call, so a standalone `export` does not leak into
          # the next line. The android workload pulls SDK 10.0.300 whose ILLink
          # ComputeManagedAssemblies task host bootstrap hard-fails with MSB4221
          # / MSB4027 unless DOTNET_HOST_PATH is set, so the export must share a
          # shell with the dotnet invocation — keep them on one line.
          # Dump the last 500 logcat lines on failure to diagnose app crashes
          # (Microsoft.Android.Run reports "could not retrieve PID" but doesn't
          # tell us *why* the app exited before pidof could see it).
          script: bash -c 'export DOTNET_HOST_PATH="$(command -v dotnet)"; adb logcat -c; adb logcat -v threadtime > /tmp/logcat.txt 2>&1 & LOGCAT_PID=$!; dotnet run --project samples/basic/AppTester -c Release --report-trx --no-progress --select uno --test-env tfm=net10.0-android; rc=$?; kill $LOGCAT_PID 2>/dev/null; if [ $rc -ne 0 ]; then echo "=== context lines around the FATAL signal ==="; grep -n FATAL /tmp/logcat.txt | head -1 | cut -d: -f1 | while read l; do awk -v s=$((l-80)) -v e=$((l+30)) "NR>=s && NR<=e" /tmp/logcat.txt; done; echo "=== end logcat ==="; fi; exit $rc'

      - name: Publish test results
        uses: dorny/test-reporter@v2.2.0
        with:
          name: test-results
          path: samples/basic/AppTester/bin/Release/net10.0/TestResults/*.trx
          reporter: dotnet-trx
